name: Compare Functions
on: push
jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - run: printenv | grep 'FUNC'
        env: 
          CONTAINS_FUNC: ${{ contains('Hello', 'ell') }}
          START_WITH_FUNC: ${{ startsWith('Hello', 'He') }}
          ENDS_WITH_FUNC: ${{ endWith('Hello', 'lo') }}